# MFlow LongMemEval Benchmark Configuration
# 
# This file contains all configurable parameters for the benchmark.
# Modify these values to customize your evaluation.

# ============================================================================
# Dataset Configuration
# ============================================================================
dataset:
  # Path to LongMemEval data file (relative to workspace root)
  data_path: "data/longmemeval_oracle.json"
  
  # Number of questions to evaluate (max 500)
  max_questions: 50
  
  # Start index for partial evaluation
  start_from: 0

# ============================================================================
# MFlow Configuration
# ============================================================================
mflow:
  # Dataset naming prefix for ingestion
  dataset_prefix: "lme_"
  
  # Content type for memorization
  content_type: "DIALOG"
  
  # Ingestion strategy
  ingestion:
    # Per-session add+memorize (recommended for Episode Routing)
    per_session_memorize: true
    
    # Delay between sessions (seconds)
    session_delay: 0.1

# ============================================================================
# Retrieval Configuration
# ============================================================================
retrieval:
  # Number of memories to retrieve
  top_k: 10
  
  # Wide search multiplier
  wide_search_multiplier: 3
  
  # Display mode for episodes
  display_mode: "summary"

# ============================================================================
# Evaluation Configuration
# ============================================================================
evaluation:
  # Model for generating answers
  answer_model: "gpt-4.1-mini"
  
  # Model for judging answers
  judge_model: "gpt-4.1-mini"
  
  # Maximum tokens for answer generation
  max_answer_tokens: 50
  
  # Temperature for answer generation
  temperature: 0.0
  
  # Delay between API calls (seconds)
  api_delay: 0.5

# ============================================================================
# Metrics Configuration
# ============================================================================
metrics:
  # BLEU configuration
  bleu:
    weights: [1, 0, 0, 0]  # BLEU-1 only
    smoothing: "method1"
  
  # F1 configuration
  f1:
    lowercase: true
    remove_punctuation: true

# ============================================================================
# Output Configuration
# ============================================================================
output:
  # Directory for results (relative to MFlow root)
  results_dir: "results"
  
  # Save detailed per-question results
  save_details: true
  
  # Generate markdown report
  generate_report: true

# ============================================================================
# Embedding Configuration (should match .env)
# ============================================================================
embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1024

# ============================================================================
# Prompts
# ============================================================================
prompts:
  answer: |
    You are an intelligent memory assistant. Answer the question based on the retrieved memories.

    # INSTRUCTIONS:
    1. Carefully analyze all provided memories
    2. Pay attention to timestamps to determine temporal relationships
    3. If memories contain contradictory information, prioritize the most recent
    4. Answer should be concise (less than 6 words)

    # Retrieved Memories:
    {memories}

    # Question: {question}

    Answer:
  
  judge: |
    Label the answer as 'CORRECT' or 'WRONG'.

    Question: {question}
    Gold answer: {gold_answer}
    Generated answer: {generated_answer}

    Be generous: if the answer captures the same meaning or time period, mark CORRECT.
    Return JSON: {"label": "CORRECT"} or {"label": "WRONG"}
